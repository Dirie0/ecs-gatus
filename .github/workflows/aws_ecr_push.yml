name: aws_ecr_push

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: false
        default: dev
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write
  contents: read
  security-events: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOYMENT_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image variables
        id: vars
        run: |
          echo "registry=${{ steps.login-ecr.outputs.registry }}" >> $GITHUB_OUTPUT
          echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "image=${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        run: |
          cd gatus
          docker build -t ${{ steps.vars.outputs.image }} .

      - name: Scan Image (Grype)
        uses: anchore/scan-action@v6
        with:
          image: ${{ steps.vars.outputs.image }}
          fail-build: true
          severity-cutoff: critical
          output-format: sarif
          output-file: grype-results.sarif

      - name: Upload Scan Results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: grype-results.sarif

      - name: Push Docker Image
        run: |
          docker push ${{ steps.vars.outputs.image }}

      - name: Job Summary
        run: |
          echo "## ECR Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Repo: ${{ secrets.ECR_REPOSITORY }}" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ${{ steps.vars.outputs.image }}" >> $GITHUB_STEP_SUMMARY