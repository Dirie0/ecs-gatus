name: Post Terraform Deployment Check

on:
  workflow_run:
    workflows: ["Deploy AWS ECS with Terraform"]
    types: [completed]
    branches: [main]

  workflow_dispatch:
    inputs:
      environment:
        description: "The environment to deploy to"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
          - prod
concurrency:
  group: build=${{ github.ref }}
  cancel-in-progress: true

permissions:
    id-token: write
    contents: read
    issues: write

env:
  ENVIRONMENT: ${{ inputs.environment }}


jobs:
  deploy:
    name: Post Terraform Deployment Check
    runs-on: ubuntu-latest
    enviroment: ${{ inputs.environment }}

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOYMENT_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Setup
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.8.5

      - name: Terraform Destroy
        run: |
          terraform init -backend-config="environments/${{ inputs.environment }}/terraform.tfvars"
          terraform destroy -auto-approve -var-file="environments/${{ inputs.environment }}/terraform.tfvars"