name: Post Terraform Deployment Check

on:
  workflow_run:
    workflows: ["Deploy AWS ECS with Terraform"]
    types: [completed]
    branches: [main]

  workflow_dispatch:
    inputs:
      environment:
        description: "The environment to deploy to"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  ENVIRONMENT: ${{ inputs.environment }}
  URL_TO_CHECK: ${{ secrets.URL_TO_CHECK }}
  AWS_REGION: eu-west-1


jobs:
  deploy:
    name: Post Deployment Check
    runs-on: ubuntu-latest
  permissions:
    id-token: write
    contents: read
    issues: write
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOYMENT_ROLE }}
          aws-region: eu-west-1

      - name: Terraform Setup
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.7.6

      - name: Terraform Destroy
        run: |
          terraform init -backend-config="environments/dev/terraform.tfvars"
          terraform destroy -auto-approve -var-file="environments/dev/terraform.tfvars"