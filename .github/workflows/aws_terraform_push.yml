name: deploy Terraform

on: Workflow Dispatch
inputs:
    environment:
      description: 'The environment to deploy to'
      required: true
      default: 'dev'
      type: choice
      options:
        - dev
        - staging
        - prod

env: 
  environemnt: ${{inputs.environemnt}}
jobs: 
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: ${{inputs.environemnt}}
    permissions:
      id-token: write
      contents: read
      issues: write
    defaults:
     run:
     working-directory: terraform
    
    steps: 
    name: Checkout
      -uses: actions/checkout@v4
    name: Terraform Setup
      -uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.8.5
    name: Configure AWS Credentials
      -uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_DEPLOYMENT_ROLE }}
        aws-region: eu-west-1   
    name: Run Terraform Init
      -run:|
        cd terraform
        terraform init \
         -backend-config="bucket=${{ vars.TF_S3_BACKEND_BUCKET_NAME }}" \
         -backend-config="key=${{ inputs.environment }}/terraform.tfstate" \
         -backend-config="region=${{ vars.AWS_REGION }}"

    name: Run Terraform plan
      -run: terraform plan -var-file="${{ inputs.environment }}_terraform.tfvars" -out=tfplan

    name: Run Manual Approval
     with:
          secret: ${{ github.TOKEN }}
          approvers: ${{ github.actor }}
        minimum-approvals: 1
          issue-title: "Deploying to ${{ inputs.environment }} environment"
          issue-body: "Please review the Terraform plan and approve this deployment to ${{ inputs.environment }}."

  name: Run Terraform Apply
      -if: ${{ github.event.action == 'submitted' && github.event.inputs.approval == 'approved' }}
      -run: terraform apply tfplan





