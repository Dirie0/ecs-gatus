name: CD - Deploy to ECS

on:
  workflow_run:
    workflows: ["CI - Build & Push"]
    types: [completed]
    branches:
      - main
      - staging
      - dev

  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    environment: >-
      ${{ github.event.workflow_run.head_branch == 'main' && 'production' ||
          github.event.workflow_run.head_branch == 'staging' && 'staging' ||
          'dev' }}
    env:
      TF_ENV: >-
        ${{ github.event.workflow_run.head_branch == 'main' && 'production' ||
            github.event.workflow_run.head_branch == 'staging' && 'staging' ||
            'dev' }}


    defaults:
      run:
        working-directory: ./terraform

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOYMENT_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend-config="env/${{ env.TF_ENV }}.backend.tfvars"

      - name: Terraform Plan
        run: terraform plan -var-file="env/${{ env.TF_ENV }}.tfvars" -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan